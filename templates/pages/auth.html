<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bilme</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i data-lucide="palette" class="auth-logo"></i>
                <h1>Welcome to Bilme</h1>
                <p>Sign in with GitHub to continue</p>
            </div>
            
            <div class="auth-providers">
                <div class="auth-providers-header">
                    <p>Login with</p>
                </div>
                <div class="auth-options">
                    <a id="github-btn" href="#" class="auth-btn github">
                        <div class="auth-btn-logo">
                            <img src="https://github.com/favicon.ico" alt="GitHub">
                        </div>
                        <div class="auth-btn-content">
                            <strong>GitHub</strong>
                            <span>Sign in with your GitHub account</span>
                        </div>
                        <div class="auth-btn-arrow">
                            <i data-lucide="arrow-right"></i>
                        </div>
                    </a>
                </div>
            </div>
            
            <div class="auth-footer">
                <a href="https://github.com/signup" target="_blank" class="auth-footer-link">Sign up for GitHub</a>
            </div>
        </div>
    </main>

    {{template "footer" .}}

    <script>
        window.GITHUB_CLIENT_ID = "{{.GITHUB_CLIENT_ID}}";
    </script>
    <script src="/static/js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
